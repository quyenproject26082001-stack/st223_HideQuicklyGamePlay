<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collision Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }

  #sidebar {
    width: 270px; min-width: 270px; background: #16213e; padding: 10px;
    display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
  }
  #sidebar h2 { color: #e94560; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

  .section { background: #0f3460; border-radius: 6px; padding: 8px; }
  .section label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }

  /* Palette */
  #palette { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .preset-btn {
    padding: 6px 4px; border: 2px solid transparent; border-radius: 5px;
    cursor: pointer; font-size: 11px; font-weight: bold; text-align: center;
    transition: all .15s; background: #1a1a2e; color: #eee;
  }
  .preset-btn:hover { opacity: 0.85; }
  .preset-btn.active { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.4); }

  /* Tools */
  .tool-row { display: flex; gap: 4px; }
  button {
    flex: 1; padding: 6px; border: none; border-radius: 4px;
    cursor: pointer; font-size: 11px; font-weight: bold; transition: opacity .2s;
  }
  button:hover { opacity: 0.85; }
  button.active { outline: 2px solid #fff; }
  .btn-delete { background: #c0392b; color: #fff; }
  .btn-clear  { background: #555;    color: #fff; }
  .btn-export { background: #27ae60; color: #fff; }
  .btn-load   { background: #2980b9; color: #fff; }
  .btn-undo   { background: #777;    color: #fff; }
  .btn-mode   { background: #533483; color: #fff; }
  .btn-mode.active { background: #7b52c5; outline: 2px solid #fff; }

  /* Item list */
  #itemList { max-height: 160px; overflow-y: auto; font-size: 10px; }
  .item-row {
    padding: 3px 6px; margin: 2px 0; background: #1a1a2e;
    border-radius: 3px; cursor: pointer; display: flex; justify-content: space-between;
    border-left: 3px solid #533483;
  }
  .item-row.selected { border-left-color: #ffff00; background: #2a2a0e; }
  .item-row:hover { background: #2a2a4e; }

  /* Legend */
  #legend { display: flex; flex-direction: column; gap: 3px; }
  .leg-row { display: flex; align-items: center; gap: 6px; font-size: 10px; }
  .leg-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #444; flex-shrink: 0; }

  /* Canvas */
  #canvas-container {
    flex: 1; overflow: auto; background: #111; display: flex;
    align-items: flex-start; justify-content: flex-start;
  }
  #mainCanvas { cursor: crosshair; display: block; }
  #mainCanvas.select-mode { cursor: default; }

  #coords { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.75);
    padding: 4px 10px; border-radius: 4px; font-size: 11px; pointer-events: none; }

  input[type=range]  { width: 100%; }
  input[type=number] { width: 100%; padding: 3px; background: #1a1a2e; border: 1px solid #333;
    border-radius: 4px; color: #eee; font-size: 11px; }
  .ratio-grid { display:grid; grid-template-columns: 1fr 72px; gap:4px 6px; align-items:center; }
  .hint-box { margin-top:6px; padding:6px; border-radius:4px; background:#1a1a2e; color:#bbb; font-size:10px; line-height:1.5; }

  /* XML popup */
  #xmlOutput { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 80%; max-height: 80vh; background: #111; border: 1px solid #e94560;
    border-radius: 8px; z-index: 100; padding: 16px; overflow-y: auto; }
  #xmlOutput textarea { width: 100%; height: 300px; background: #1a1a2e; color: #0f0;
    border: none; font-family: monospace; font-size: 11px; padding: 8px; border-radius: 4px; }
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
  kbd { background:#0f3460; border:1px solid #4a6fa5; border-radius:3px;
    padding:1px 5px; font-size:10px; font-family:monospace; color:#eee; }

  .active-info { font-size: 11px; padding: 4px 6px; border-radius: 4px; background: #1a1a2e;
    display: flex; align-items: center; gap: 6px; }
  .active-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>🗺 Collision Editor</h2>

  <!-- Map image -->
  <div class="section">
    <label>Map Image — <b id="mapLabel" style="color:#e94560">Map ?</b></label>
    <div class="tool-row" style="margin-bottom:4px">
      <button class="btn-mode" onclick="prevMap()" style="flex:0 0 36px">◀</button>
      <button class="btn-mode" onclick="nextMap()" style="flex:1">▶ Next map</button>
      <button class="btn-load" onclick="selectImgDir()" style="flex:0 0 36px" title="app\src\main\assets\Map">📁</button>
    </div>
    <div style="font-size:9px;color:#666;margin:2px 0;word-break:break-all">📌 app\src\main\assets\Map</div>
    <div id="imgDirInfo" style="font-size:10px;color:#aaa;margin:2px 0;display:none">
      📂 <span id="imgDirName"></span>
    </div>
    <input type="file" id="imgInput" accept="image/*" style="font-size:10px;color:#aaa;width:100%">
    <div style="margin-top:5px">
      <label>Opacity nền: <span id="opacVal">70</span>%</label>
      <input type="range" id="bgOpacity" min="0" max="100" value="70"
        oninput="bgOpacity=this.value/100;document.getElementById('opacVal').textContent=this.value;render()">
    </div>
  </div>

  <!-- Viewport -->
  <div class="section">
    <label>Viewport (Android dp)</label>
    <div style="display:flex;gap:4px">
      <input type="number" id="vpW" value="1997" placeholder="W">
      <input type="number" id="vpH" value="3258" placeholder="H">
    </div>
  </div>

  <div class="section">
    <label>Tỷ lệ stroke theo viewport ngắn</label>
    <div class="ratio-grid">
      <span>Wall / Door ratio</span>
      <input type="number" id="wallRatio" value="0.0195" step="0.0001">
      <span>Dot / Spawn ratio</span>
      <input type="number" id="dotRatio" value="0.0586" step="0.0001">
    </div>
    <div id="ratioHint" class="hint-box"></div>
    <div class="tool-row" style="margin-top:6px">
      <button class="btn-mode" onclick="applySuggestedSizeToPreset()">Áp cho preset</button>
      <button class="btn-mode" onclick="normalizeItemsByRatio()">Scale items</button>
    </div>
  </div>

  <!-- Palette -->
  <div class="section">
    <label>Palette nhanh (click để chọn)</label>
    <div id="palette"></div>
  </div>

  <!-- Active preset info -->
  <div class="active-info" id="activeInfo">
    <div class="active-dot" id="activeDot"></div>
    <span id="activeLabel">—</span>
    <span id="activeModeTag" style="color:#aaa;font-size:10px"></span>
  </div>

  <!-- Mode buttons -->
  <div class="section">
    <label>Chế độ vẽ</label>
    <div class="tool-row">
      <button class="btn-mode active" id="btnDraw"   onclick="setTool('draw')">✏️ Line</button>
      <button class="btn-mode"        id="btnDot"    onclick="setTool('dot')">⬤ Chấm</button>
      <button class="btn-mode"        id="btnSelect" onclick="setTool('select')">↖ Select</button>
    </div>
    <div class="tool-row" style="margin-top:4px">
      <button class="btn-mode" id="btnEraser" onclick="setTool('eraser')" style="background:#8B4513;flex:1">🧹 Tẩy</button>
      <button class="btn-mode" id="btnBrush"  onclick="setTool('brush')"  style="background:#2a5a2a;flex:1">🤍 Vùng Spawn</button>
    </div>
    <div id="lineSizeRow" style="display:none;margin-top:5px">
      <label>Độ dày tường: <span id="lineVal">20</span>dp</label>
      <input type="range" id="lineSize" min="5" max="200" value="20"
        oninput="document.getElementById('lineVal').textContent=this.value">
    </div>
    <div id="eraserSizeRow" style="display:none;margin-top:5px">
      <label>Bán kính tẩy: <span id="erVal">80</span>dp</label>
      <input type="range" id="eraserSize" min="10" max="300" value="80"
        oninput="document.getElementById('erVal').textContent=this.value">
    </div>
    <div id="brushSizeRow" style="display:none;margin-top:5px">
      <label>Cỡ bút vùng spawn: <span id="brVal">120</span>dp</label>
      <input type="range" id="brushSize" min="20" max="400" value="120"
        oninput="document.getElementById('brVal').textContent=this.value">
      <label style="margin-top:4px">Độ mờ: <span id="brOpVal">30</span>%</label>
      <input type="range" id="brushOpacity" min="5" max="80" value="30"
        oninput="document.getElementById('brOpVal').textContent=this.value;render()">
    </div>
  </div>

  <!-- Item list -->
  <div class="section">
    <label>Danh sách (<span id="itemCount">0</span>)</label>
    <div id="itemList"></div>
    <div class="tool-row" style="margin-top:5px">
      <button class="btn-delete" onclick="deleteSelected()">🗑 Xóa</button>
      <button class="btn-undo"   onclick="undo()">↩ Undo</button>
    </div>
    <button class="btn-clear" onclick="clearAll()" style="width:100%;margin-top:4px">🗑 Xóa tất cả</button>
  </div>

  <!-- Load XML -->
  <div class="section">
    <label>Load / Import XML</label>
    <button class="btn-load" onclick="selectXmlDir()" style="width:100%">📁 Chọn thư mục drawable...</button>
    <div style="font-size:9px;color:#666;margin:2px 0;word-break:break-all">📌 app\src\main\res\drawable</div>
    <div id="xmlDirInfo" style="font-size:10px;color:#aaa;margin:3px 0;display:none">
      📂 <span id="xmlDirName"></span>
    </div>
    <input type="file" id="xmlFileInput" accept=".xml" style="display:none" onchange="loadXMLFile(this)">
    <button class="btn-load" onclick="document.getElementById('xmlFileInput').click()" style="width:100%;margin-top:3px">📄 Chọn file XML bất kỳ...</button>
    <button class="btn-load" onclick="loadDefaultXML()" style="width:100%;margin-top:3px">📂 Load map1.xml mặc định</button>
    <textarea id="xmlInput" placeholder="Hoặc paste XML vào đây..." style="width:100%;height:60px;margin-top:5px;background:#1a1a2e;border:1px solid #333;border-radius:4px;color:#eee;font-size:10px;padding:4px"></textarea>
    <button class="btn-load" onclick="parseXMLInput()" style="margin-top:3px;width:100%">⚙ Parse XML</button>
  </div>

  <!-- Snap -->
  <div class="section">
    <label>Snap to grid</label>
    <div style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="snapCheck">
      <span style="font-size:11px">Bật snap</span>
      <input type="number" id="snapSize" value="10" style="width:50px">
    </div>
  </div>

  <!-- Legend -->
  <div class="section">
    <label>Legend màu</label>
    <div id="legend"></div>
  </div>

  <div class="tool-row">
    <button class="btn-export" onclick="exportXML()" style="flex:1">👁 Preview XML</button>
    <button class="btn-export" onclick="saveToDrawable()" style="flex:1;background:#1a6b40">💾 Lưu mapN.xml</button>
  </div>

  <!-- Phím tắt -->
  <div class="section">
    <label>⌨ Phím tắt</label>
    <div style="font-size:10px;line-height:1.8;color:#ccc">
      <div><kbd>1</kbd>–<kbd>9</kbd> &nbsp;Chọn preset</div>
      <div><kbd>L</kbd> &nbsp;✏️ Vẽ line</div>
      <div><kbd>P</kbd> &nbsp;⬤ Chấm điểm</div>
      <div><kbd>S</kbd> &nbsp;↖ Select / di chuyển</div>
      <div><kbd>E</kbd> &nbsp;🧹 Tẩy</div>
      <div><kbd>B</kbd> &nbsp;🤍 Vùng Spawn</div>
      <div><kbd>Del</kbd> &nbsp;Xóa item đang chọn</div>
      <div><kbd>Ctrl</kbd>+<kbd>Z</kbd> &nbsp;Undo</div>
    </div>
  </div>
</div>

<div id="canvas-container">
  <canvas id="mainCanvas"></canvas>
</div>

<div id="coords">x: 0, y: 0</div>
<div id="overlay" onclick="closeXML()"></div>
<div id="xmlOutput">
  <h3 style="color:#e94560;margin-bottom:8px">Android Vector Drawable XML</h3>
  <textarea id="xmlText" readonly></textarea>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn-export" onclick="copyXML()">📋 Copy</button>
    <button class="btn-clear"  onclick="closeXML()">✕ Đóng</button>
  </div>
</div>

<script>
// ─── Presets ────────────────────────────────────────────────────────────────
const PRESETS = [
  { id:'wall',    emoji:'🧱', label:'Tường',        color:'#000000', tool:'draw', width:20 },
  { id:'door',    emoji:'🚪', label:'Cửa',          color:'#FF0000', tool:'draw', width:20 },
  { id:'killer',  emoji:'💀', label:'Killer Spawn', color:'#00FF00', tool:'dot',  size:60  },
  { id:'hider',   emoji:'🔵', label:'Hider Spawn',  color:'#0080FF', tool:'dot',  size:60  },
  { id:'bedroom', emoji:'😴', label:'Phòng ngủ',    color:'#FFFF00', tool:'dot',  size:60  },
  { id:'bath',    emoji:'🛁', label:'Phòng tắm',    color:'#00FFFF', tool:'dot',  size:60  },
  { id:'toilet',  emoji:'🚽', label:'Nhà vệ sinh',  color:'#FF00FF', tool:'dot',  size:60  },
  { id:'kitchen', emoji:'🍳', label:'Bếp',          color:'#FF8000', tool:'dot',  size:60  },
  { id:'living',  emoji:'🛋', label:'Phòng khách',  color:'#FF69B4', tool:'dot',  size:60  },
];

let activePreset = PRESETS[0];
const WALL_RATIO_DEFAULT = 20 / 1024;
const DOT_RATIO_DEFAULT = 60 / 1024;

function ratioBaseSize() {
  return Math.min(vpW || 1024, vpH || 1024) || 1024;
}

function getWallRatio() {
  return parseFloat(document.getElementById('wallRatio').value) || WALL_RATIO_DEFAULT;
}

function getDotRatio() {
  return parseFloat(document.getElementById('dotRatio').value) || DOT_RATIO_DEFAULT;
}

function suggestedWallWidth() {
  return Math.max(5, Math.round(ratioBaseSize() * getWallRatio()));
}

function suggestedDotSize() {
  return Math.max(12, Math.round(ratioBaseSize() * getDotRatio()));
}

function setLineSizeValue(value) {
  const rounded = Math.round(value);
  document.getElementById('lineSize').value = rounded;
  document.getElementById('lineVal').textContent = rounded;
}

function syncPresetSizesFromRatio() {
  const wallWidth = suggestedWallWidth();
  const dotSize = suggestedDotSize();
  PRESETS.forEach(p => {
    if (p.tool === 'draw') p.width = wallWidth;
    else p.size = dotSize;
  });
}

function updateRatioHint() {
  const base = ratioBaseSize();
  document.getElementById('ratioHint').innerHTML =
    `Base = min(viewport) = <b>${Math.round(base)}</b><br>` +
    `Gợi ý wall/door = <b>${suggestedWallWidth()}dp</b><br>` +
    `Gợi ý dot/spawn = <b>${suggestedDotSize()}dp</b>`;
}

function applySuggestedSizeToPreset() {
  syncPresetSizesFromRatio();
  if (activePreset.tool === 'draw') {
    setLineSizeValue(activePreset.width || suggestedWallWidth());
  }
  updateRatioHint();
  updateActiveInfo();
  render();
}

function normalizeItemsByRatio() {
  if (!items.length) return;
  pushHistory();
  syncPresetSizesFromRatio();
  items = items.map(it => {
    const preset = PRESETS.find(p => p.color === it.color);
    if (!preset) return { ...it };
    if (it.type === 'line' || it.type === 'polyline') {
      return { ...it, width: preset.width || suggestedWallWidth() };
    }
    return { ...it, size: preset.size || suggestedDotSize() };
  });
  updateList();
  updateRatioHint();
  render();
}

function buildPalette() {
  const el = document.getElementById('palette');
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (p === activePreset ? ' active' : '');
    btn.id = 'preset_' + p.id;
    btn.style.background = p.color === '#000000' ? '#333' : p.color + '33';
    btn.style.borderColor = p.color;
    btn.style.color = '#fff';
    btn.innerHTML = `${p.emoji}<br><span style="font-size:9px">${p.label}</span>`;
    btn.onclick = () => selectPreset(p);
    el.appendChild(btn);
  });

  const leg = document.getElementById('legend');
  PRESETS.forEach(p => {
    const row = document.createElement('div');
    row.className = 'leg-row';
    row.innerHTML = `<div class="leg-swatch" style="background:${p.color}"></div>
      <span>${p.emoji} ${p.label} <span style="color:#666">(${p.tool})</span></span>`;
    leg.appendChild(row);
  });
}

function selectPreset(p) {
  activePreset = p;
  syncPresetSizesFromRatio();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('preset_' + p.id).classList.add('active');
  if (p.tool === 'draw') {
    setLineSizeValue(p.width || suggestedWallWidth());
  }
  setTool(p.tool);
  updateActiveInfo();
}

function updateActiveInfo() {
  document.getElementById('activeDot').style.background = activePreset.color;
  document.getElementById('activeLabel').textContent = activePreset.emoji + ' ' + activePreset.label;
  const sizeText = activePreset.tool === 'draw'
    ? `${parseInt(document.getElementById('lineSize').value) || suggestedWallWidth()}dp`
    : `${activePreset.size || suggestedDotSize()}dp`;
  document.getElementById('activeModeTag').textContent = `[${tool}] ${sizeText}`;
}

// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

let vpW = 1997, vpH = 3258, scale = 1;
let bgImg = null, bgOpacity = 0.7;
let currentMapIndex = 1;
let imgDirHandle = null;   // FileSystemDirectoryHandle cho thư mục ảnh
let xmlDirHandle = null;   // FileSystemDirectoryHandle cho thư mục drawable
let items = [];      // {type:'line'|'polyline'|'dot', ...}
let selectedIdx = -1;
let tool = 'draw';   // 'draw' | 'dot' | 'select'
let drawing = false;
let startX, startY, curX, curY;
let drawPoints = [];
let dragOff = null, dragSnap = null;
let history = [];

function initCanvas(syncActiveSize = false) {
  vpW = parseInt(document.getElementById('vpW').value) || 1997;
  vpH = parseInt(document.getElementById('vpH').value) || 3258;
  const cont = document.getElementById('canvas-container');
  scale = Math.min((cont.clientWidth - 4) / vpW, (cont.clientHeight - 4) / vpH);
  canvas.width  = Math.round(vpW * scale);
  canvas.height = Math.round(vpH * scale);
  syncPresetSizesFromRatio();
  updateRatioHint();
  if (syncActiveSize && activePreset.tool === 'draw') {
    setLineSizeValue(activePreset.width || suggestedWallWidth());
  }
  updateActiveInfo();
  render();
}

document.getElementById('vpW').addEventListener('change', () => initCanvas(true));
document.getElementById('vpH').addEventListener('change', () => initCanvas(true));
document.getElementById('wallRatio').addEventListener('input', () => initCanvas(true));
document.getElementById('dotRatio').addEventListener('input', () => initCanvas(true));
document.getElementById('lineSize').addEventListener('input', updateActiveInfo);
window.addEventListener('resize', () => initCanvas(false));

document.getElementById('imgInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const m = f.name.match(/^(\d+)\./);
  if (m) { currentMapIndex = parseInt(m[1]); updateMapLabel(); }
  bgImg = new Image();
  bgImg.onload = () => { applyImageViewport(bgImg); render(); };
  bgImg.src = URL.createObjectURL(f);
});

// ─── Tool mode ───────────────────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  canvas.className = t === 'select' ? 'select-mode' : '';
  ['Draw','Dot','Select','Eraser','Brush'].forEach(n =>
    document.getElementById('btn'+n) &&
    document.getElementById('btn'+n).classList.toggle('active', t === n.toLowerCase())
  );
  document.getElementById('lineSizeRow').style.display   = t === 'draw'   ? 'block' : 'none';
  document.getElementById('eraserSizeRow').style.display = t === 'eraser' ? 'block' : 'none';
  document.getElementById('brushSizeRow').style.display  = t === 'brush'  ? 'block' : 'none';
  updateActiveInfo();
}

// ─── Coord helpers ────────────────────────────────────────────────────────────
function snapV(v) {
  if (!document.getElementById('snapCheck').checked) return v;
  const g = parseInt(document.getElementById('snapSize').value) || 10;
  return Math.round(v / g) * g;
}
function toVP(cx, cy)     { return { x: snapV(cx / scale), y: snapV(cy / scale) }; }
function toCanvas(vx, vy) { return { x: vx * scale, y: vy * scale }; }

function distancePointToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq < 0.0001) return Math.hypot(px - x1, py - y1);
  const t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
  const tc = Math.max(0, Math.min(1, t));
  return Math.hypot(x1 + tc * dx - px, y1 + tc * dy - py);
}

function pointsClose(a, b, eps = 0.25) {
  return Math.abs(a.x - b.x) <= eps && Math.abs(a.y - b.y) <= eps;
}

function polylineSegments(pts) {
  const segments = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i + 1];
    if (Math.hypot(b.x - a.x, b.y - a.y) < 0.001) continue;
    segments.push({ x1: a.x, y1: a.y, x2: b.x, y2: b.y });
  }
  return segments;
}

function segmentsToItems(segments, color, width) {
  if (!segments.length) return [];
  const out = [];
  let currentPts = [{ x: segments[0].x1, y: segments[0].y1 }, { x: segments[0].x2, y: segments[0].y2 }];

  function flushCurrent() {
    if (currentPts.length < 2) return;
    if (currentPts.length === 2) {
      out.push({
        type: 'line',
        x1: currentPts[0].x,
        y1: currentPts[0].y,
        x2: currentPts[1].x,
        y2: currentPts[1].y,
        color,
        width
      });
    } else {
      out.push({ type: 'polyline', pts: currentPts.map(p => ({ ...p })), color, width });
    }
  }

  for (let i = 1; i < segments.length; i++) {
    const seg = segments[i];
    const last = currentPts[currentPts.length - 1];
    const segStart = { x: seg.x1, y: seg.y1 };
    const segEnd = { x: seg.x2, y: seg.y2 };
    if (pointsClose(last, segStart)) {
      currentPts.push(segEnd);
      continue;
    }
    flushCurrent();
    currentPts = [segStart, segEnd];
  }

  flushCurrent();
  return out;
}

// ─── Hit test ─────────────────────────────────────────────────────────────────
function hitTest(vx, vy) {
  const thresh = 12 / scale;
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    if (it.type === 'dot') {
      const dotRadius = Math.max(thresh * 2, (it.size || suggestedDotSize()) / 2);
      if (Math.hypot(vx - it.x, vy - it.y) < dotRadius) return i;
    } else if (it.type === 'polyline') {
      const halfStroke = Math.max(thresh, (it.width || suggestedWallWidth()) / 2);
      const segments = polylineSegments(it.pts || []);
      for (const seg of segments) {
        if (distancePointToSegment(vx, vy, seg.x1, seg.y1, seg.x2, seg.y2) < halfStroke) {
          return i;
        }
      }
    } else {
      const halfStroke = Math.max(thresh, (it.width || suggestedWallWidth()) / 2);
      if (distancePointToSegment(vx, vy, it.x1, it.y1, it.x2, it.y2) < halfStroke) return i;
    }
  }
  return -1;
}

// ─── Mouse events ─────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const r = canvas.getBoundingClientRect();
  const vp = toVP(e.clientX - r.left, e.clientY - r.top);

  if (tool === 'eraser') { pushHistory(); eraseAt(vp.x, vp.y); return; }
  if (tool === 'brush')  { pushHistory(); startZone(vp.x, vp.y); return; }
  if (tool === 'dot') {
    pushHistory();
    items.push({ type:'dot', x:vp.x, y:vp.y,
      color: activePreset.color, size: activePreset.size || 60 });
    updateList(); render(); return;
  }
  if (tool === 'draw') {
    drawing = true;
    startX = vp.x; startY = vp.y; curX = vp.x; curY = vp.y;
    drawPoints = [{ x: vp.x, y: vp.y }];
  } else {
    const idx = hitTest(vp.x, vp.y);
    selectedIdx = idx;
    if (idx >= 0) { dragOff = { x:vp.x, y:vp.y }; dragSnap = { ...items[idx] }; }
    updateList(); render();
  }
});

let eraserPos = null; // {x,y} in viewport coords, for drawing circle

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const vp = toVP(e.clientX - r.left, e.clientY - r.top);
  document.getElementById('coords').textContent = `x: ${Math.round(vp.x)}, y: ${Math.round(vp.y)}`;

  if (tool === 'eraser') {
    eraserPos = vp;
    if (e.buttons === 1) eraseAt(vp.x, vp.y); else render();
    return;
  }
  if (tool === 'brush') {
    eraserPos = vp; // reuse for brush preview circle
    if (e.buttons === 1) addZonePoint(vp.x, vp.y); else render();
    return;
  }
  eraserPos = null;
  if (tool === 'draw' && drawing) {
    curX = vp.x; curY = vp.y;
    const last = drawPoints[drawPoints.length - 1];
    const minStep = Math.max(3, (parseInt(document.getElementById('lineSize').value) || suggestedWallWidth()) * 0.25);
    if (!last || Math.hypot(vp.x - last.x, vp.y - last.y) >= minStep) {
      drawPoints.push({ x: vp.x, y: vp.y });
    }
    render();
  }
  else if (tool === 'select' && dragOff && e.buttons === 1 && selectedIdx >= 0) {
    const dx = vp.x - dragOff.x, dy = vp.y - dragOff.y;
    const s = dragSnap, it = items[selectedIdx];
    if (s.type === 'dot') { it.x = s.x + dx; it.y = s.y + dy; }
    else if (s.type === 'polyline') {
      it.pts = s.pts.map(p => ({ x: p.x + dx, y: p.y + dy }));
    }
    else { it.x1 = s.x1+dx; it.y1 = s.y1+dy; it.x2 = s.x2+dx; it.y2 = s.y2+dy; }
    render();
  }
});

canvas.addEventListener('mouseleave', () => { eraserPos = null; render(); });

canvas.addEventListener('mouseup', e => {
  const r = canvas.getBoundingClientRect();
  const vp = toVP(e.clientX - r.left, e.clientY - r.top);
  if (tool === 'draw' && drawing) {
    drawing = false;
    const last = drawPoints[drawPoints.length - 1];
    if (!last || !pointsClose(last, { x: vp.x, y: vp.y })) {
      drawPoints.push({ x: vp.x, y: vp.y });
    }
    const filteredPoints = drawPoints.filter((pt, idx, arr) =>
      idx === 0 || !pointsClose(pt, arr[idx - 1])
    );
    if (filteredPoints.length >= 2) {
      pushHistory();
      if (filteredPoints.length === 2) {
        items.push({
          type:'line',
          x1:filteredPoints[0].x,
          y1:filteredPoints[0].y,
          x2:filteredPoints[1].x,
          y2:filteredPoints[1].y,
          color: activePreset.color,
          width: parseInt(document.getElementById('lineSize').value) || 20
        });
      } else {
        items.push({
          type:'polyline',
          pts: filteredPoints,
          color: activePreset.color,
          width: parseInt(document.getElementById('lineSize').value) || 20
        });
      }
      updateList();
    }
    drawPoints = [];
    render();
  } else if (tool === 'select') { dragOff = null; dragSnap = null; }
});

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (bgImg) {
    ctx.globalAlpha = bgOpacity;
    ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = '#333';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#666'; ctx.font = '14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('← Upload ảnh map', canvas.width/2, canvas.height/2);
  }

  // Spawn zones (dưới collision lines, không đè màu khác)
  renderZones();

  // Grid
  if (document.getElementById('snapCheck').checked) {
    const g = parseInt(document.getElementById('snapSize').value) * scale;
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
    for (let x = 0; x < canvas.width;  x += g) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
    for (let y = 0; y < canvas.height; y += g) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
  }

  // Items
  items.forEach((it, i) => {
    const sel = i === selectedIdx;
    const col = sel ? '#ffff00' : it.color;

    if (it.type === 'dot') {
      const c = toCanvas(it.x, it.y);
      const r = Math.max(4, ((it.size || suggestedDotSize()) * scale) / 2);
      ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI*2);
      ctx.fillStyle = col + (sel ? 'ff' : 'cc'); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = sel ? 2 : 1; ctx.stroke();

      // Label
      const preset = PRESETS.find(p => p.color === it.color);
      if (preset) {
        ctx.font = `${Math.max(10, r*1.2)}px monospace`;
        ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
        ctx.fillText(preset.emoji, c.x, c.y + r * 0.38);
      }
    } else if (it.type === 'polyline') {
      const pts = it.pts || [];
      if (pts.length < 2) return;
      ctx.beginPath();
      const first = toCanvas(pts[0].x, pts[0].y);
      ctx.moveTo(first.x, first.y);
      for (let j = 1; j < pts.length; j++) {
        const p = toCanvas(pts[j].x, pts[j].y);
        ctx.lineTo(p.x, p.y);
      }
      ctx.strokeStyle = col;
      ctx.lineWidth = Math.max(1, (it.width || suggestedWallWidth()) * scale);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.setLineDash([]);
      ctx.stroke();
      if (sel) {
        pts.forEach(pt => {
          const c = toCanvas(pt.x, pt.y);
          ctx.beginPath(); ctx.arc(c.x, c.y, 4, 0, Math.PI * 2);
          ctx.fillStyle = '#ffff00'; ctx.fill();
        });
      }
    } else {
      const a = toCanvas(it.x1, it.y1), b = toCanvas(it.x2, it.y2);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = col;
      ctx.lineWidth = Math.max(1, (it.width || suggestedWallWidth()) * scale);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.setLineDash([]); ctx.stroke();
      if (sel) {
        [a,b].forEach(pt => {
          ctx.beginPath(); ctx.arc(pt.x, pt.y, 5, 0, Math.PI*2);
          ctx.fillStyle = '#ffff00'; ctx.fill();
        });
      }
    }
  });

  // Tool cursor preview (eraser = orange, brush = white)
  if ((tool === 'eraser' || tool === 'brush') && eraserPos) {
    const ec = toCanvas(eraserPos.x, eraserPos.y);
    const er = (tool === 'eraser' ? eraserRadius() : brushRadius()) * scale;
    const stroke = tool === 'eraser' ? 'rgba(255,100,50,0.8)' : 'rgba(255,255,255,0.7)';
    const fill   = tool === 'eraser' ? 'rgba(255,80,30,0.12)' : 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(ec.x, ec.y, er, 0, Math.PI*2);
    ctx.strokeStyle = stroke; ctx.lineWidth = 2;
    ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = fill; ctx.fill();
  }

  // Preview while drawing
  if (drawing) {
    const previewPts = drawPoints.length ? drawPoints : [{ x: startX, y: startY }, { x: curX, y: curY }];
    ctx.beginPath();
    const first = toCanvas(previewPts[0].x, previewPts[0].y);
    ctx.moveTo(first.x, first.y);
    for (let i = 1; i < previewPts.length; i++) {
      const p = toCanvas(previewPts[i].x, previewPts[i].y);
      ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = activePreset.color;
    ctx.lineWidth = Math.max(1, (parseInt(document.getElementById('lineSize').value) || suggestedWallWidth()) * scale);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
    previewPts.forEach((pt, idx) => {
      if (idx !== 0 && idx !== previewPts.length - 1) return;
      const c = toCanvas(pt.x, pt.y);
      ctx.beginPath(); ctx.arc(c.x, c.y, 4, 0, Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    });
  }
}

// ─── List ─────────────────────────────────────────────────────────────────────
function updateList() {
  const el = document.getElementById('itemList');
  el.innerHTML = '';
  document.getElementById('itemCount').textContent = items.length;
  items.forEach((it, i) => {
    const preset = PRESETS.find(p => p.color === it.color);
    const label = preset ? preset.emoji + ' ' + preset.label : it.color;
    const coords = it.type === 'dot'
      ? `(${Math.round(it.x)},${Math.round(it.y)})`
      : `(${Math.round(it.x1)},${Math.round(it.y1)})→(${Math.round(it.x2)},${Math.round(it.y2)})`;
    const d = document.createElement('div');
    d.className = 'item-row' + (i === selectedIdx ? ' selected' : '');
    d.innerHTML = `<span>${label}</span><span style="color:#888;font-size:9px">${coords}</span>`;
    d.onclick = () => { selectedIdx = i; updateList(); render(); };
    el.appendChild(d);
  });
}

// ─── Brush / Spawn Zone ───────────────────────────────────────────────────────
let zones = []; // [{pts:[{x,y}...], brushR, opacity}] — drawn under collision items

function brushRadius()  { return parseFloat(document.getElementById('brushSize').value)   || 120; }
function brushOpacity() { return (parseFloat(document.getElementById('brushOpacity').value) || 30) / 100; }

function startZone(x, y) {
  zones.push({ pts:[{x,y}], brushR: brushRadius() });
  render();
}

function addZonePoint(x, y) {
  if (!zones.length) { startZone(x, y); return; }
  const z = zones[zones.length - 1];
  const last = z.pts[z.pts.length - 1];
  // Only add point if moved enough (avoids redundant points)
  if (Math.hypot(x - last.x, y - last.y) > z.brushR * 0.3) z.pts.push({x, y});
  render();
}

function renderZones() {
  if (!zones.length) return;
  const op = brushOpacity();
  zones.forEach(z => {
    if (!z.pts.length) return;
    const r = Math.max(4, z.brushR * scale);
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = `rgba(255,255,255,${op})`;
    ctx.fillStyle   = `rgba(255,255,255,${op})`;
    ctx.lineWidth   = r * 2;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    if (z.pts.length === 1) {
      const p = toCanvas(z.pts[0].x, z.pts[0].y);
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath();
      const p0 = toCanvas(z.pts[0].x, z.pts[0].y);
      ctx.moveTo(p0.x, p0.y);
      z.pts.forEach(p => { const c = toCanvas(p.x, p.y); ctx.lineTo(c.x, c.y); });
      ctx.stroke();
    }
    ctx.restore();
  });
}

// ─── Eraser ───────────────────────────────────────────────────────────────────
function eraserRadius() {
  return parseFloat(document.getElementById('eraserSize').value) || 80;
}

// Clip a line segment against a circle — returns 0, 1 or 2 sub-segments
function clipLineCircle(line, cx, cy, r) {
  const dx = line.x2 - line.x1, dy = line.y2 - line.y1;
  const fx = line.x1 - cx,      fy = line.y1 - cy;
  const a = dx*dx + dy*dy;
  if (a < 0.0001) return []; // zero-length line inside circle
  const b = 2*(fx*dx + fy*dy);
  const c = fx*fx + fy*fy - r*r;
  const disc = b*b - 4*a*c;
  if (disc < 0) return [line]; // no intersection → keep whole line

  const sq = Math.sqrt(disc);
  const t1 = (-b - sq) / (2*a);
  const t2 = (-b + sq) / (2*a);
  const enter = Math.max(0, t1);
  const exit  = Math.min(1, t2);
  if (enter >= exit) return [line]; // circle misses segment range

  const result = [];
  if (enter > 0.002)
    result.push({ ...line, x2: line.x1 + enter*dx, y2: line.y1 + enter*dy });
  if (exit < 0.998)
    result.push({ ...line, x1: line.x1 + exit*dx,  y1: line.y1 + exit*dy  });
  return result; // empty = whole segment was inside circle (deleted)
}

function clipPolylineCircle(polyline, cx, cy, r) {
  const rebuilt = [];
  let currentSegments = [];

  function flushSegments() {
    if (!currentSegments.length) return;
    rebuilt.push(...segmentsToItems(currentSegments, polyline.color, polyline.width));
    currentSegments = [];
  }

  for (const seg of polylineSegments(polyline.pts || [])) {
    const clipped = clipLineCircle(seg, cx, cy, r);
    if (!clipped.length) {
      flushSegments();
      continue;
    }
    for (let i = 0; i < clipped.length; i++) {
      const piece = clipped[i];
      if (!currentSegments.length) {
        currentSegments.push(piece);
      } else {
        const prev = currentSegments[currentSegments.length - 1];
        if (pointsClose({ x: prev.x2, y: prev.y2 }, { x: piece.x1, y: piece.y1 })) {
          currentSegments.push(piece);
        } else {
          flushSegments();
          currentSegments.push(piece);
        }
      }
      if (i < clipped.length - 1) flushSegments();
    }
  }

  flushSegments();
  return rebuilt;
}

function eraseAt(ex, ey) {
  const r = eraserRadius();
  const next = [];
  for (const it of items) {
    if (it.type === 'dot') {
      if (Math.hypot(it.x - ex, it.y - ey) > r) next.push(it);
    } else if (it.type === 'polyline') {
      next.push(...clipPolylineCircle(it, ex, ey, r));
    } else {
      next.push(...clipLineCircle(it, ex, ey, r));
    }
  }
  items = next;
  // Erase zone strokes — remove any stroke that has a point inside eraser radius
  zones = zones.filter(z => !z.pts.some(p => Math.hypot(p.x - ex, p.y - ey) < r));
  updateList(); render();
}

// ─── History ──────────────────────────────────────────────────────────────────
function pushHistory() {
  history.push({ items: JSON.parse(JSON.stringify(items)), zones: JSON.parse(JSON.stringify(zones)) });
  if (history.length > 50) history.shift();
}
function undo() {
  if (!history.length) return;
  const s = history.pop(); items = s.items; zones = s.zones;
  selectedIdx = -1; updateList(); render();
}
function deleteSelected() {
  if (selectedIdx < 0 || selectedIdx >= items.length) return;
  pushHistory(); items.splice(selectedIdx, 1); selectedIdx = -1; updateList(); render();
}
function clearAll() {
  if (!confirm('Xóa tất cả?')) return;
  pushHistory(); items = []; zones = []; selectedIdx = -1; updateList(); render();
}

function loadDefaultXML() {
  document.getElementById('xmlInput').value = DEFAULT_XML;
  parseXMLInput();
}

function loadXMLFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('xmlInput').value = e.target.result;
    parseXMLInput();
  };
  reader.readAsText(file, 'UTF-8');
  input.value = ''; // reset để có thể load lại cùng file
}

function androidColorToHex(raw) {
  // #AARRGGBB → #RRGGBB
  const hex = raw.replace('#','');
  return '#' + (hex.length === 8 ? hex.substring(2) : hex);
}

function parseXMLInput() {
  const xml = document.getElementById('xmlInput').value.trim();
  if (!xml) return;
  try {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const vector = doc.querySelector('vector');
    if (vector) {
      // Iterate attrs để tránh vấn đề namespace trong text/xml parsing
      for (const attr of vector.attributes) {
        if (attr.name.endsWith('viewportWidth'))  vpW = parseFloat(attr.value) || vpW;
        if (attr.name.endsWith('viewportHeight')) vpH = parseFloat(attr.value) || vpH;
      }
      document.getElementById('vpW').value = vpW;
      document.getElementById('vpH').value = vpH;
    }
    pushHistory(); items = [];
    doc.querySelectorAll('path').forEach(p => {
      // Dùng endsWith thay vì getAttribute('android:xxx') để tránh lỗi namespace
      let d = '', col = '#FF000000', sw = 20, isRound = false;
      for (const attr of p.attributes) {
        const n = attr.name;
        if (n.endsWith('pathData'))      d       = attr.value;
        if (n.endsWith('strokeColor'))   col     = attr.value;
        if (n.endsWith('strokeWidth'))   sw      = parseFloat(attr.value) || 20;
        if (n.endsWith('strokeLineCap')) isRound = (attr.value === 'round');
      }
      col = androidColorToHex(col);
      const m = d.match(/M\s*([\d.-]+)\s+([\d.-]+)\s*L?\s*([\d.-]+)\s+([\d.-]+)/i);
      if (!m) return;
      const x1=parseFloat(m[1]),y1=parseFloat(m[2]),x2=parseFloat(m[3]),y2=parseFloat(m[4]);
      const isDot = isRound || (Math.abs(x1-x2)<1 && Math.abs(y1-y2)<1);
      if (isDot) {
        items.push({ type:'dot', x:x1, y:y1, color:col, size:sw });
      } else {
        items.push({ type:'line', x1, y1, x2, y2, color:col, width:sw });
      }
    });
    initCanvas(true); updateList();
  } catch(e) { alert('XML parse error: ' + e); }
}

function hexToAndroid(hex) {
  // #RRGGBB → #FFRRGGBB
  return '#FF' + hex.replace('#','').toUpperCase();
}

function generateXML() {
  let xml = `<vector xmlns:android="http://schemas.android.com/apk/res/android"\n`;
  xml += `    android:width="${vpW}dp"\n    android:height="${vpH}dp"\n`;
  xml += `    android:viewportWidth="${vpW}"\n    android:viewportHeight="${vpH}">\n`;
  items.forEach(it => {
    const col = hexToAndroid(it.color);
    if (it.type === 'dot') {
      const x = +it.x.toFixed(2), y = +it.y.toFixed(2);
      xml += `    <path\n        android:strokeColor="${col}"\n`;
      xml += `        android:strokeWidth="${it.size || 60}"\n`;
      xml += `        android:strokeLineCap="round"\n`;
      xml += `        android:pathData="M${x} ${y}L${x} ${y}"/>\n`;
    } else {
      const x1=+it.x1.toFixed(2),y1=+it.y1.toFixed(2),x2=+it.x2.toFixed(2),y2=+it.y2.toFixed(2);
      xml += `    <path\n        android:strokeColor="${col}"\n`;
      xml += `        android:strokeWidth="${it.width || 20}"\n`;
      xml += `        android:pathData="M${x1} ${y1}L${x2} ${y2}"/>\n`;
    }
  });
  xml += `</vector>`;
  return xml;
}

function exportXML() {
  document.getElementById('xmlText').value = generateXML();
  document.getElementById('xmlOutput').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
}

async function saveToDrawable() {
  const xml = generateXML();
  const filename = `map${currentMapIndex}.xml`;
  if (xmlDirHandle) {
    try {
      const fh = await xmlDirHandle.getFileHandle(filename, { create: true });
      const w  = await fh.createWritable();
      await w.write(xml);
      await w.close();
      alert(`✅ Đã lưu ${filename} vào ${xmlDirHandle.name}`);
      return;
    } catch(e) { console.warn('Lỗi ghi file:', e); }
  }
  // Fallback: download
  const blob = new Blob([xml], { type: 'application/xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// ─── IndexedDB — lưu directory handle giữa các session ───────────────────────
const IDB_NAME = 'collision_editor_v1';

function openIDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    r.onsuccess = e => res(e.target.result);
    r.onerror   = rej;
  });
}
async function idbPut(key, val) {
  try {
    const db = await openIDB();
    await new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readwrite');
      tx.objectStore('handles').put(val, key);
      tx.oncomplete = res; tx.onerror = rej;
    });
    db.close();
  } catch(e) { console.warn('idbPut', e); }
}
async function idbGet(key) {
  try {
    const db = await openIDB();
    const val = await new Promise((res, rej) => {
      const req = db.transaction('handles','readonly').objectStore('handles').get(key);
      req.onsuccess = () => res(req.result); req.onerror = rej;
    });
    db.close(); return val;
  } catch(e) { return null; }
}

}

async function selectImgDir() {
  try {
    // startIn = handle đã lưu → picker mở ngay tại thư mục cũ
    const saved   = imgDirHandle || await idbGet('imgDir');
    const startIn = saved || 'pictures';
    imgDirHandle  = await window.showDirectoryPicker({ mode: 'read', startIn });
    await idbPut('imgDir', imgDirHandle);
    updateImgDirUI();
    await loadMapImage(currentMapIndex);
  } catch(e) { if (e.name !== 'AbortError') alert('Lỗi: ' + e); }
}

async function selectXmlDir() {
  try {
    const saved   = xmlDirHandle || await idbGet('xmlDir');
    const startIn = saved || 'documents';
    xmlDirHandle  = await window.showDirectoryPicker({ mode: 'readwrite', startIn });
    await idbPut('xmlDir', xmlDirHandle);
    updateXmlDirUI();
    await loadMapXML(currentMapIndex);
  } catch(e) { if (e.name !== 'AbortError') alert('Lỗi: ' + e); }
}

async function loadMapImage(index) {
  if (!imgDirHandle) return;
  for (const ext of ['jpg', 'png', 'jpeg', 'webp']) {
    try {
      const fh   = await imgDirHandle.getFileHandle(`${index}.${ext}`);
      const file = await fh.getFile();
      bgImg = new Image();
      bgImg.onload = () => { applyImageViewport(bgImg); render(); };
      bgImg.src = URL.createObjectURL(file);
      return;
    } catch(_) {}
  }
}

async function loadMapXML(index) {
  if (!xmlDirHandle) return;
  try {
    const fh   = await xmlDirHandle.getFileHandle(`map${index}.xml`);
    const file = await fh.getFile();
    const text = await file.text();
    document.getElementById('xmlInput').value = text;
    parseXMLInput();
  } catch(_) {
    pushHistory(); items = []; zones = [];
    updateList(); render();
  }
}

async function nextMap() {
  if (currentMapIndex >= 47) return;
  currentMapIndex++;
  updateMapLabel();
  await Promise.all([loadMapImage(currentMapIndex), loadMapXML(currentMapIndex)]);
}

async function prevMap() {
  if (currentMapIndex <= 1) return;
  currentMapIndex--;
  updateMapLabel();
  await Promise.all([loadMapImage(currentMapIndex), loadMapXML(currentMapIndex)]);
}

// Khôi phục tên thư mục đã chọn từ session trước (chỉ UI, không auto-load)

  const imgH = await idbGet('imgDir');
  if (imgH) { imgDirHandle = imgH; updateImgDirUI(); }
  const xmlH = await idbGet('xmlDir');
  if (xmlH) { xmlDirHandle = xmlH; updateXmlDirUI(); }

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.key === 'l') setTool('draw');
  if (e.key === 'p') setTool('dot');
  if (e.key === 's') setTool('select');
  if (e.key === 'e') setTool('eraser');
  if (e.key === 'b') setTool('brush');
  // Number keys 1-8 select preset
  const n = parseInt(e.key);
  if (n >= 1 && n <= PRESETS.length) selectPreset(PRESETS[n-1]);
});

function updateList() {
  const el = document.getElementById('itemList');
  el.innerHTML = '';
  document.getElementById('itemCount').textContent = items.length;
  items.forEach((it, i) => {
    const preset = PRESETS.find(p => p.color === it.color);
    const label = preset ? preset.emoji + ' ' + preset.label : it.color;
    let coords = '';
    if (it.type === 'dot') {
      coords = `(${Math.round(it.x)},${Math.round(it.y)})`;
    } else if (it.type === 'polyline') {
      coords = `${it.pts.length} pts`;
    } else {
      coords = `(${Math.round(it.x1)},${Math.round(it.y1)}) -> (${Math.round(it.x2)},${Math.round(it.y2)})`;
    }
    const d = document.createElement('div');
    d.className = 'item-row' + (i === selectedIdx ? ' selected' : '');
    d.innerHTML = `<span>${label}</span><span style="color:#888;font-size:9px">${coords}</span>`;
    d.onclick = () => { selectedIdx = i; updateList(); render(); };
    el.appendChild(d);
  });
}

function parsePathPoints(pathData) {
  const pts = [];
  const regex = /[ML]\s*([\d.-]+)\s+([\d.-]+)/ig;
  let match;
  while ((match = regex.exec(pathData)) !== null) {
    pts.push({ x: parseFloat(match[1]), y: parseFloat(match[2]) });
  }
  return pts;
}

function parseXMLInput() {
  const xml = document.getElementById('xmlInput').value.trim();
  if (!xml) return;
  try {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const vector = doc.querySelector('vector');
    if (vector) {
      for (const attr of vector.attributes) {
        if (attr.name.endsWith('viewportWidth')) vpW = parseFloat(attr.value) || vpW;
        if (attr.name.endsWith('viewportHeight')) vpH = parseFloat(attr.value) || vpH;
      }
      document.getElementById('vpW').value = vpW;
      document.getElementById('vpH').value = vpH;
    }

    pushHistory();
    items = [];
    doc.querySelectorAll('path').forEach(p => {
      let d = '', col = '#FF000000', sw = 20, isRound = false;
      for (const attr of p.attributes) {
        const n = attr.name;
        if (n.endsWith('pathData')) d = attr.value;
        if (n.endsWith('strokeColor')) col = attr.value;
        if (n.endsWith('strokeWidth')) sw = parseFloat(attr.value) || 20;
        if (n.endsWith('strokeLineCap')) isRound = (attr.value === 'round');
      }

      const pts = parsePathPoints(d);
      if (!pts.length) return;

      col = androidColorToHex(col);
      const first = pts[0];
      const last = pts[pts.length - 1];
      const isDot = isRound || (
        pts.length <= 2 &&
        Math.abs(first.x - last.x) < 1 &&
        Math.abs(first.y - last.y) < 1
      );

      if (isDot) {
        items.push({ type: 'dot', x: first.x, y: first.y, color: col, size: sw });
      } else if (pts.length > 2) {
        items.push({ type: 'polyline', pts, color: col, width: sw });
      } else {
        items.push({ type: 'line', x1: first.x, y1: first.y, x2: last.x, y2: last.y, color: col, width: sw });
      }
    });

    initCanvas(true);
    updateList();
  } catch (e) {
    alert('XML parse error: ' + e);
  }
}

function generateXML() {
  let xml = `<vector xmlns:android="http://schemas.android.com/apk/res/android"\n`;
  xml += `    android:width="${vpW}dp"\n    android:height="${vpH}dp"\n`;
  xml += `    android:viewportWidth="${vpW}"\n    android:viewportHeight="${vpH}">\n`;

  items.forEach(it => {
    const col = hexToAndroid(it.color);
    if (it.type === 'dot') {
      const x = +it.x.toFixed(2), y = +it.y.toFixed(2);
      xml += `    <path\n        android:strokeColor="${col}"\n`;
      xml += `        android:strokeWidth="${it.size || 60}"\n`;
      xml += `        android:strokeLineCap="round"\n`;
      xml += `        android:pathData="M${x} ${y}L${x} ${y}"/>\n`;
      return;
    }

    if (it.type === 'polyline') {
      const pts = (it.pts || []).map(p => ({ x: +p.x.toFixed(2), y: +p.y.toFixed(2) }));
      if (pts.length < 2) return;

      if (it.color === '#FF0000') {
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          xml += `    <path\n        android:strokeColor="${col}"\n`;
          xml += `        android:strokeWidth="${it.width || 20}"\n`;
          xml += `        android:pathData="M${a.x} ${a.y}L${b.x} ${b.y}"/>\n`;
        }
        return;
      }

      const pathData = pts.map((p, idx) =>
        idx === 0 ? `M${p.x} ${p.y}` : `L${p.x} ${p.y}`
      ).join('');
      xml += `    <path\n        android:strokeColor="${col}"\n`;
      xml += `        android:strokeWidth="${it.width || 20}"\n`;
      xml += `        android:strokeLineCap="round"\n`;
      xml += `        android:strokeLineJoin="round"\n`;
      xml += `        android:pathData="${pathData}"/>\n`;
      return;
    }

    const x1 = +it.x1.toFixed(2), y1 = +it.y1.toFixed(2), x2 = +it.x2.toFixed(2), y2 = +it.y2.toFixed(2);
    xml += `    <path\n        android:strokeColor="${col}"\n`;
    xml += `        android:strokeWidth="${it.width || 20}"\n`;
    xml += `        android:pathData="M${x1} ${y1}L${x2} ${y2}"/>\n`;
  });

  xml += `</vector>`;
  return xml;
}
